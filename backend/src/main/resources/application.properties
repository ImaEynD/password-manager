server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://127.0.0.1:5433/password_manager
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Logging
logging.level.com.example.passwordmanager=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Jackson
spring.jackson.serialization.INDENT_OUTPUT=true
spring.jackson.default-property-inclusion=non_null

# JWT Configuration
app.jwt.secret=${JWT_SECRET:just-simple-over-32-symbols-jwt-secret-cuz-its-not-for-production}
app.jwt.expiration=900000